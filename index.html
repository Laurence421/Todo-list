<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./css/component.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
</head>
<body>
    <form id="form" class="w-full h-40 bg-black flex justify-center flex-col items-end-safe">
        <h1 class="text-white h-30 text-center flex justify-center items-center font-bold text-4xl w-full"><i class="uil uil-rocket text-5xl text-[#1E6F9F]"></i>Todo List</h1>
        <section class="h-0 flex justify-center flex-row w-full gap-1">
            <input id="input-text"class=" w-70 sm:w-120 lg:w-150 rounded-sm items-center h-8  cursor-text" type="text-aria">
            <button type="submit" class="text-white text-center w-10 xs:w-10 bg-[#1E6F9F]  h-8 rounded-sm cursor-pointer"><i  class="uil uil-plus"></i></button>
        </section>
    </form>
    <main class=" w-full h-screen flex justify-center bg-[#1A1A1A] ">
        <section id="todo-list" class=" flex-col ">
            <span class="w-full flex flex-row justify-start "><p>Created tasks</p></span>
            <ul id="table" class=" w-full flex justify-center flex-col rounded items-center">
              
            </ul>
            
        </section>
    </main>
</body>
 <script src="./js/todo.js"></script>
</html>
